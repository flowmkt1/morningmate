<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>morningmate — My Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="morningmate-icons.css">
<style>
  :root{--mm:#6449FC;--dark:#1F1D27;--line:#ECECEF;--gn:#3FD09E;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:Roboto,'Noto Sans JP','Noto Sans KR',sans-serif;color:#2b2b33;background:#fff;-webkit-font-smoothing:antialiased;}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  /* 다크 상단바(전체폭) */
  .top{height:50px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--dark);position:relative;z-index:20;}
  .top .demo{font-size:12.5px;color:#fff;background:#3A3742;border-radius:16px;padding:6px 13px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .top .demo .b{color:#FF6B9D;}
  .search{position:absolute;left:50%;transform:translateX(-50%);width:430px;display:flex;align-items:center;gap:10px;background:#3A3742;border-radius:8px;padding:8px 14px;}
  .search .lz{display:flex;color:#9b9aa4;} .search .txt{flex:1;text-align:center;color:#c9c9d2;font-size:13px;} .search .mg{display:flex;color:#c9c9d2;}
  .top .right{display:flex;align-items:center;gap:15px;margin-left:auto;color:#C7C7D2;}
  .top .upd{font-size:12px;color:#fff;background:#3A3742;border-radius:14px;padding:5px 11px;display:flex;align-items:center;gap:6px;}
  .top .upd .n{color:#FF7A45;font-weight:800;}
  .top .ic{cursor:pointer;display:flex;}
  .badge-n{position:relative;}.badge-n .n{position:absolute;top:-7px;right:-9px;background:#FF3B30;color:#fff;font-size:9px;border-radius:9px;padding:1px 4px;font-weight:700;}
  .top .ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#9DC8FF,#C5A3FF) center/cover;}
  .body{flex:1;display:flex;min-height:0;}
  /* 밝은 사이드바 */
  .sb{width:234px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:10px 10px 0;overflow:auto;}
  .sb::-webkit-scrollbar{width:6px;} .sb::-webkit-scrollbar-thumb{background:#E2E2E8;border-radius:3px;}
  .sb-logo{display:flex;align-items:center;justify-content:center;height:46px;margin:4px 4px 12px;}
  .sb-logo img{height:24px;width:auto;}
  .sb-new{display:flex;align-items:center;justify-content:center;gap:8px;background:#EFECFF;color:var(--mm);font-weight:700;font-size:13.5px;border-radius:10px;height:42px;margin:0 4px 12px;cursor:pointer;}
  .sb-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;font-size:13.5px;color:#4b4b58;cursor:pointer;}
  .sb-item:hover{background:#F5F5F8;}
  .sb-item.on{background:rgba(63,208,158,.12);color:#1FA877;font-weight:700;position:relative;}
  .sb-item.on::before{content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--gn);}
  .sb-item .badge{margin-left:auto;font-size:12px;color:#1FA877;font-weight:700;}
  .sb-item [class^="ico-"]{font-size:18px;width:20px;text-align:center;color:#8a8a92;flex-shrink:0;}
  .sb-item.on [class^="ico-"]{color:#1FA877;}
  .sb-item .ic{width:18px;height:18px;color:#8a8a92;flex-shrink:0;}
  .sb-sec{font-size:11.5px;color:#9a9aa2;font-weight:700;padding:16px 12px 5px;display:flex;align-items:center;justify-content:space-between;letter-spacing:.3px;}
  .sb-sec .cv{cursor:pointer;}
  .sb-proj{display:flex;align-items:center;gap:9px;padding:7px 12px;font-size:13px;color:#5b5b66;cursor:pointer;white-space:nowrap;overflow:hidden;}
  .sb-proj:hover{background:#F5F5F8;border-radius:8px;}
  .sb-proj .sq{width:13px;height:13px;border-radius:4px;flex-shrink:0;} .sb-proj .em{font-size:12px;} .sb-proj .nm{overflow:hidden;text-overflow:ellipsis;}
  .sb-foot{margin-top:8px;padding:8px 0 12px;border-top:1px solid var(--line);}
  /* main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:#fff;}
  .pwrap{flex:1;overflow:auto;}
  .pv-h{display:flex;align-items:baseline;gap:10px;padding:22px 30px 0;} .pv-h h1{font-size:22px;font-weight:800;margin:0;color:#23233a;} .pv-h .cnt{font-size:16px;font-weight:700;color:#A3A3AE;}
  .pv-sub{font-size:12.5px;color:#a3a3ae;padding:6px 30px 0;}
  .pv-pad{padding:18px 30px 60px;}
  /* 컨트롤 바(태스크/간트) */
  .pv-ctl{display:flex;align-items:center;gap:8px;padding:14px 30px 0;flex-wrap:wrap;}
  .ctl-dd{display:inline-flex;align-items:center;gap:8px;border:1px solid #E2E2E8;border-radius:8px;padding:8px 12px;font-size:13px;color:#444;min-width:150px;justify-content:space-between;cursor:pointer;}
  .ctl-b{display:inline-flex;align-items:center;gap:6px;border:1px solid #E2E2E8;border-radius:8px;padding:8px 12px;font-size:13px;color:#555;cursor:pointer;}
  .ctl-b.on{background:#EFECFF;border-color:#D9D2FF;color:var(--mm);font-weight:600;}
  .ctl-b .x{color:#aaa;margin-left:2px;}
  .ctl-sp{flex:1;}
  .ctl-r{display:inline-flex;align-items:center;gap:14px;color:#888;font-size:13px;}
  .ctl-r .ck{display:inline-flex;align-items:center;gap:6px;}
  /* 그룹 테이블(태스크) */
  .tbl-wrap{overflow-x:auto;border-top:1px solid var(--line);margin-top:14px;}
  .tk-tbl{min-width:1180px;border-collapse:collapse;width:100%;}
  .tk-tbl thead th{position:sticky;top:0;background:#fff;font-size:12px;font-weight:600;color:#9a9aa2;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .tk-grp{background:#FAFAFB;} .tk-grp td{padding:12px 16px;font-size:14px;font-weight:700;color:#2b2b33;border-bottom:1px solid var(--line);}
  .tk-grp .tw{display:inline-flex;align-items:center;gap:9px;} .tk-grp .cv{color:#9a9aa2;cursor:pointer;font-size:11px;} .tk-grp .sc{font-size:11px;color:#9a9aa2;font-weight:600;background:#EEE;border-radius:10px;padding:1px 8px;margin-left:4px;}
  .tk-sub td{padding:10px 16px 10px 30px;font-size:13px;font-weight:700;color:#555;border-bottom:1px solid #F4F4F6;background:#fff;}
  .tk-sub .cv{color:#bbb;margin-right:7px;cursor:pointer;font-size:10px;} .tk-sub .n{color:#a3a3ae;font-weight:600;margin-left:5px;}
  .tk-r td{padding:11px 14px;font-size:13px;color:#3a3a42;border-bottom:1px solid #F4F4F6;white-space:nowrap;}
  .tk-r td.nm{padding-left:42px;color:#2b2b33;}
  .tk-r:hover td{background:#FBFBFC;}
  .tk-add td{padding:10px 16px 10px 42px;font-size:13px;color:#9a9aa2;cursor:pointer;border-bottom:1px solid #F4F4F6;}
  .tk-st{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:13px;white-space:nowrap;}
  .tk-prog{display:inline-flex;align-items:center;gap:8px;} .tk-prog .bar{width:70px;height:5px;border-radius:3px;background:#ECECEF;overflow:hidden;} .tk-prog .bar span{display:block;height:100%;background:#C7C7CF;} .tk-prog .pct{font-size:12px;color:#999;}
  .av-nm{display:inline-flex;align-items:center;gap:6px;} .av-dot{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#9DC8FF,#C5A3FF) center/cover;flex-shrink:0;}
  /* 간트 */
  .gt-wrap{overflow:auto;border-top:1px solid var(--line);margin-top:14px;}
  .gt{min-width:1280px;}
  .gt-row{display:flex;border-bottom:1px solid #F4F4F6;height:40px;align-items:center;}
  .gt-l{width:540px;flex-shrink:0;display:flex;align-items:center;border-right:1px solid var(--line);height:100%;}
  .gt-l .c1{flex:1;padding:0 14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
  .gt-l .c2{width:110px;flex-shrink:0;padding:0 10px;} .gt-l .c3,.gt-l .c4{width:80px;flex-shrink:0;font-size:12px;color:#999;padding:0 10px;}
  .gt-hd{background:#FAFAFB;color:#9a9aa2;font-size:12px;font-weight:600;position:sticky;top:0;z-index:2;}
  .gt-hd .c1{font-weight:600;}
  .gt-tl{flex:1;position:relative;height:100%;display:flex;}
  .gt-mh{display:flex;align-items:center;font-weight:700;color:#7a7a85;font-size:11.5px;padding-left:6px;border-bottom:1px solid var(--line);height:22px;}
  .gt-d{flex:1;min-width:34px;text-align:center;border-left:1px solid #F4F4F6;font-size:11px;color:#aaa;line-height:40px;} .gt-d.we{background:#FAF8FF;}
  .gt-bar{position:absolute;top:50%;transform:translateY(-50%);height:15px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .gt-today{position:absolute;top:0;bottom:0;width:2px;background:#A78BFA;z-index:1;}
  .gt-grp{display:flex;background:#FAFAFB;border-bottom:1px solid var(--line);height:38px;align-items:center;} .gt-grp .gl{width:540px;flex-shrink:0;padding:0 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:9px;border-right:1px solid var(--line);height:100%;}
  .gt-grp .gt-tl{position:relative;} .gt-sub .gl{padding-left:30px;font-size:13px;font-weight:700;color:#555;}
  /* 캘린더 */
  .cal-top{display:flex;align-items:center;gap:14px;padding:16px 30px 0;} .cal-top .mo{font-size:18px;font-weight:800;} .cal-top .nav{display:flex;gap:6px;color:#888;} .cal-top .nav span{cursor:pointer;width:26px;height:26px;border:1px solid #E2E2E8;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .cal-top .r{margin-left:auto;display:flex;gap:10px;align-items:center;color:#777;font-size:13px;} .cal-top .r .today{color:#E0584D;}
  .cal{margin:14px 30px 40px;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .cal-wd{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line);} .cal-wd span{padding:9px 12px;font-size:12px;color:#8a8a92;font-weight:600;} .cal-wd .sun{color:#E0584D;} .cal-wd .sat{color:#3A78E0;}
  .cal-g{display:grid;grid-template-columns:repeat(7,1fr);}
  .cal-c{min-height:96px;border-right:1px solid #F4F4F6;border-bottom:1px solid #F4F4F6;padding:7px 9px;position:relative;}
  .cal-c.empty{background:#FCFCFD;} .cal-c .dn{font-size:12.5px;color:#777;} .cal-c.today .dn{background:#6449FC;color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
  .cal-c.sun .dn{color:#E0584D;}
  .cal-allday{grid-column:1/-1;background:#F6A609;color:#fff;font-size:11.5px;font-weight:600;padding:3px 12px;display:flex;align-items:center;gap:8px;}
  .cal-ev{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#444;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .cal-ev .d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .cal-hol{background:#E0584D;color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;margin-top:5px;display:inline-block;}
  /* 라이브러리(파일) */
  .lib{display:flex;min-height:0;flex:1;}
  .lib-side{width:230px;flex-shrink:0;border-right:1px solid var(--line);padding:18px 14px;overflow:auto;}
  .lib-lab{font-size:12px;color:#9a9aa2;font-weight:700;margin:0 0 8px;}
  .lib-dd{border:1px solid #E2E2E8;border-radius:8px;padding:9px 12px;font-size:13px;color:#444;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .lib-pj{display:flex;align-items:center;gap:8px;padding:7px 8px;font-size:13px;color:#555;border-radius:7px;cursor:pointer;white-space:nowrap;overflow:hidden;} .lib-pj:hover{background:#F5F5F8;} .lib-pj .sq{width:12px;height:12px;border-radius:3px;flex-shrink:0;} .lib-pj .nm{overflow:hidden;text-overflow:ellipsis;}
  .lib-pj.all{font-weight:700;color:#2b2b33;}
  .lib-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:auto;padding:18px 24px 50px;}
  .lib-srch{display:flex;align-items:center;gap:10px;border:1px solid #E2E2E8;border-radius:9px;padding:10px 14px;color:#aaa;font-size:13px;margin-bottom:8px;max-width:420px;}
  .lib-tbl{width:100%;border-collapse:collapse;}
  .lib-tbl th{text-align:left;font-size:12px;color:#9a9aa2;font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);}
  .lib-tbl th.r,.lib-tbl td.r{text-align:right;} .lib-tbl th.c,.lib-tbl td.c{text-align:center;}
  .lib-tbl td{padding:13px 14px;font-size:13px;color:#444;border-bottom:1px solid #F4F4F6;vertical-align:middle;} .lib-tbl tr:hover td{background:#FBFBFC;}
  .lib-f{display:flex;align-items:center;gap:12px;} .lib-fic{width:36px;height:36px;border-radius:8px;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .lib-fn{font-weight:600;color:#2b2b33;} .lib-fp{font-size:12px;color:#9a9aa2;margin-top:3px;display:flex;align-items:center;gap:5px;} .lib-fp .d{width:8px;height:8px;border-radius:50%;}
  /* 멘션/리스트 */
  .ml-top{display:flex;align-items:center;gap:10px;padding:6px 30px 0;}
  .ml-srch{flex:1;max-width:420px;display:flex;align-items:center;gap:10px;border:1px solid #E2E2E8;border-radius:9px;padding:10px 14px;color:#aaa;font-size:13px;}
  .ml-cnt{font-size:13px;color:#666;font-weight:700;padding:16px 30px 4px;}
  .ml-list{padding:0 30px 50px;}
  .ml-row{display:flex;align-items:center;gap:14px;padding:15px 6px;border-bottom:1px solid #F4F4F6;cursor:pointer;} .ml-row:hover{background:#FBFBFC;}
  .ml-ic{display:flex;align-items:center;gap:6px;font-size:12px;color:#9a9aa2;width:74px;flex-shrink:0;}
  .ml-b{flex:1;min-width:0;} .ml-t{font-size:13.5px;color:#2b2b33;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .ml-t b{font-weight:700;}
  .ml-m{display:flex;align-items:center;gap:7px;margin-top:5px;font-size:12px;color:#9a9aa2;} .ml-m .d{width:8px;height:8px;border-radius:50%;}
  .ml-rt{text-align:right;flex-shrink:0;color:#a3a3ae;font-size:12px;min-width:130px;} .ml-rt .who{color:#777;}
  /* 대시보드 */
  .d-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;} .d-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;} .d-num{font-size:30px;font-weight:800;line-height:1;} .d-lab{font-size:13px;color:#8a8a92;margin-top:8px;}
  .d-sec{font-size:15px;font-weight:700;color:#444;margin:26px 0 12px;}
  .d-prog{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 18px;} .d-pr{padding:13px 0;border-bottom:1px solid #F4F4F6;} .d-pr:last-child{border-bottom:none;} .d-pr-h{display:flex;align-items:center;margin-bottom:9px;} .d-pct{margin-left:auto;font-size:13px;font-weight:700;color:#555;} .d-bar{height:8px;border-radius:5px;background:#EFEFF2;overflow:hidden;} .d-bar span{display:block;height:100%;border-radius:5px;}
  .pv-ptag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#666;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .pv-ptag .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
  /* 프로젝트 그리드(My/공개) */
  .fav-h{font-size:15px;font-weight:700;color:#444;margin:0 0 14px;}
  #pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px;}
  .pcard{position:relative;background:#FAFAFA;border:1px solid #DDD;border-radius:6px;padding:15px 15px 15px 30px;height:170px;cursor:pointer;display:flex;flex-direction:column;transition:box-shadow .15s;} .pcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .pc-stripe{position:absolute;left:0;top:0;bottom:0;width:9px;background:var(--c);border-radius:6px 0 0 6px;}
  .pc-cnt{position:absolute;top:-8px;right:-6px;background:#FF3B30;color:#fff;font-size:11px;font-weight:700;border-radius:50%;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
  .pc-top{height:22px;} .pc-top .star{color:#FFB800;font-size:17px;} .pc-name{margin-top:18px;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#333;line-height:1.4;} .pc-foot{display:flex;align-items:center;color:#999;font-size:14px;margin-top:auto;} .pc-foot .mem{display:flex;align-items:center;gap:5px;} .pc-foot .globe{margin-left:auto;opacity:.55;}
  /* 초대 */
  .pv-invite{background:#fff;border:1px solid var(--line);border-radius:14px;padding:40px;text-align:center;max-width:460px;} .iv-ic{font-size:40px;} .iv-h{font-size:19px;font-weight:800;margin:12px 0 6px;} .iv-p{font-size:13.5px;color:#8a8a9a;margin-bottom:20px;} .iv-row{display:flex;gap:10px;} .iv-in{flex:1;border:1px solid #E2E2E8;border-radius:9px;padding:11px 14px;font-size:13.5px;font-family:inherit;outline:none;} .iv-in:focus{border-color:var(--mm);} .iv-btn{background:var(--mm);color:#fff;border:0;border-radius:9px;padding:0 20px;font-weight:700;cursor:pointer;}
  .pv-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;} .pv-li{display:flex;align-items:center;gap:12px;background:#fff;padding:14px 16px;cursor:pointer;} .pv-li:hover{background:#FAFAFB;} .pv-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;} .pv-bm{font-size:18px;width:30px;text-align:center;flex-shrink:0;} .pv-li-b{flex:1;min-width:0;} .pv-li-t{font-size:13.5px;color:#2b2b33;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .pv-li-m{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:12px;color:#9a9aa2;} .pv-li-m .sep{color:#d8d8de;} .pv-star{color:#FFB800;font-size:16px;}
  .mham{display:none;align-items:center;justify-content:center;cursor:pointer;}
  #mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1150;}
  @media (max-width:880px){
    .mham{display:flex;margin-right:4px;} .search{position:static;transform:none;flex:1;width:auto;} .search .txt{text-align:left;}
    .sb{position:fixed;top:50px;left:0;bottom:0;z-index:1200;transform:translateX(-100%);transition:transform .25s;box-shadow:4px 0 24px rgba(0,0,0,.18);} .sb.mopen{transform:translateX(0);} #mob-ov.on{display:block;}
    .pv-h,.pv-ctl,.pv-pad,.cal-top,.cal,.ml-top,.ml-cnt,.ml-list{padding-left:16px;padding-right:16px;} .cal{margin-left:16px;margin-right:16px;} #pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  }
</style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="mham" id="mham"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C7C7D2" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></div>
      <span class="demo"><span class="b">👤</span><span data-i18n="bookDemo">Demoを予約する</span></span>
      <div class="search"><span class="lz"><svg width="18" height="14" viewBox="0 0 24 24" fill="none" stroke="#9b9aa4" stroke-width="2"><path d="M3 6h18M3 12h11M3 18h7"/></svg></span><span class="txt" data-i18n="search">Smart Search</span><span class="mg"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c9c9d2" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg></span></div>
      <div class="right">
