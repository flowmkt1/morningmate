<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>morningmate — My Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="morningmate-icons.css">
<style>
  :root{--mm:#6449FC;--dark:#2C2A34;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:Roboto,'Noto Sans KR','Noto Sans JP',sans-serif;color:#333;background:#fff;-webkit-font-smoothing:antialiased;}
  .app{display:flex;height:100vh;overflow:hidden;}
  /* 다크 사이드바 */
  .sb{width:228px;flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;padding:14px 12px;overflow:auto;}
  .sb-logo{display:flex;align-items:center;justify-content:center;background:#fff;border-radius:26px;height:52px;margin:2px 4px 14px;}
  .sb-logo img{height:26px;width:auto;display:block;}
  .sb-new{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--mm);color:#fff;font-weight:600;font-size:14px;border-radius:9px;height:42px;margin:0 4px 14px;}
  .sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font-size:14px;color:#C7C7D2;cursor:pointer;}
  .sb-item:hover{background:rgba(255,255,255,.06);}
  .sb-item.on{background:rgba(63,208,158,.14);color:#3FD09E;font-weight:600;position:relative;}
  .sb-item.on::before{content:"";position:absolute;left:-12px;top:7px;bottom:7px;width:4px;border-radius:0 3px 3px 0;background:#3FD09E;}
  .sb-item .badge{margin-left:auto;font-size:12px;color:#3FD09E;}
  .sb-sec{font-size:12px;color:#7E7C88;font-weight:700;padding:16px 12px 6px;display:flex;align-items:center;justify-content:space-between;}
  .sb-proj{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;color:#B6B6C2;cursor:pointer;white-space:nowrap;overflow:hidden;}
  .sb-proj .sq{width:14px;height:14px;border-radius:4px;flex-shrink:0;} .sb-proj .em{font-size:11px;} .sb-proj .nm{overflow:hidden;text-overflow:ellipsis;}
  .sb-foot{margin-top:auto;padding-top:10px;}
  .sb-foot .cs{display:flex;align-items:center;gap:8px;margin:6px 4px 0;padding:10px 12px;background:rgba(194,56,126,.18);border-radius:8px;font-size:13px;color:#F19ACB;}
  /* main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .top{height:48px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 18px;background:var(--dark);position:relative;}
  .top .demo{font-size:12px;color:#E8E8EE;border:1px solid #4A4853;border-radius:14px;padding:5px 12px;display:flex;align-items:center;gap:6px;}
  .search{position:absolute;left:50%;transform:translateX(-50%);width:460px;display:flex;align-items:center;gap:10px;background:#3A3742;border-radius:8px;padding:8px 14px;}
  .search .lz{display:flex;color:#9b9aa4;} .search .txt{flex:1;text-align:center;color:#dcdce2;font-size:13px;} .search .mg{display:flex;color:#dcdce2;}
  .top .right{display:flex;align-items:center;gap:16px;margin-left:auto;color:#C7C7D2;}
  .top .mm-ic{font-size:21px;line-height:1;cursor:pointer;}
  .top .notice{font-size:12px;color:#fff;background:#3A3742;border-radius:14px;padding:5px 10px;display:flex;align-items:center;gap:6px;}
  .top .notice .n{background:#F59E1B;color:#fff;font-size:9px;border-radius:4px;padding:1px 4px;font-weight:700;}
  .badge-n{position:relative;color:#C7C7D2;}.badge-n .n{position:absolute;top:-6px;right:-8px;background:#FF3B30;color:#fff;font-size:9px;border-radius:9px;padding:1px 4px;}
  .ava{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#9DC8FF,#C5A3FF);}
  /* content */
  .pwrap{flex:1;overflow:auto;padding:26px 40px 60px;}
  .pwrap-inner{max-width:1146px;margin:0 auto;}
  .ic{width:18px;height:18px;flex-shrink:0;}
  .sb [class^="ico-"]{font-size:19px;line-height:1;flex-shrink:0;width:20px;text-align:center;opacity:.92;}
  .sb-new [class^="ico-"]{font-size:18px;width:18px;}
  .sb-item .ic,.sb-new .ic{opacity:.92;} .sb-new .ic{width:17px;height:17px;}
  .top .ic{width:19px;height:19px;}
  .pwrap-h{display:flex;align-items:center;margin-bottom:20px;}
  .pwrap-h h1{font-size:24px;font-weight:700;margin:0;flex:1;color:#333;}
  .pwrap-h .ctl{display:flex;align-items:center;gap:18px;color:#888;font-size:13px;}
  .pwrap-h .ctl .vt{display:flex;gap:4px;}
  .pwrap-h .ctl .vt .v{width:30px;height:30px;border:1px solid #E2E2E8;border-radius:6px;display:flex;align-items:center;justify-content:center;} .pwrap-h .ctl .vt .v.on{background:#EFECFF;color:var(--mm);border-color:#D9D2FF;}
  .fav-h{font-size:15px;font-weight:700;color:#444;margin:6px 0 14px;}
  #pgrid{display:grid;grid-template-columns:repeat(4,273px);gap:18px;justify-content:start;}
  .pcard{position:relative;background:#FAFAFA;border:1px solid #DDD;border-radius:6px;padding:15px 15px 15px 32px;height:180px;cursor:pointer;display:flex;flex-direction:column;transition:box-shadow .15s;}
  .pcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .pc-stripe{position:absolute;left:0;top:0;bottom:0;width:10px;background:var(--c);border-radius:6px 0 0 6px;}
  .pc-cnt{position:absolute;top:-8px;right:-6px;background:#FF3B30;color:#fff;font-size:12px;font-weight:700;border-radius:50%;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;padding:0 6px;box-shadow:0 1px 4px rgba(0,0,0,.22);}
  .pc-top{height:24px;} .pc-top .star{color:#FFB800;font-size:18px;}
  .pc-name{margin-top:22px;display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#333;line-height:1.4;}
  .pc-foot{display:flex;align-items:center;color:#999;font-size:14px;margin-top:auto;}
  .pc-foot .mem{display:flex;align-items:center;gap:5px;} .pc-foot .globe{margin-left:auto;opacity:.55;}
  .mham{display:none;align-items:center;justify-content:center;cursor:pointer;margin-right:6px;flex-shrink:0;}
  #mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1150;}
  @media (max-width:820px){
    .mham{display:flex;}
    .top{gap:10px;padding:0 12px;}
    .search{position:static;transform:none;flex:1;width:auto;margin:0;}
    .search .txt{text-align:left;}
    .sb{position:fixed;top:48px;left:0;bottom:0;z-index:1200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.18);width:264px;}
    .sb.mopen{transform:translateX(0);}
    #mob-ov.on{display:block;}
    .pwrap{padding:18px 14px 50px;}
    .pwrap-h h1{font-size:20px;}
    .pwrap-h .ctl{gap:10px;font-size:12px;}
    .pwrap-inner{max-width:none;}
    #pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .pcard{width:auto;height:150px;padding:13px 13px 13px 26px;}
  }
  /* ===== 통합 뷰(cross-project) 공통 ===== */
  .pv-note{font-size:13px;color:#9a9aa2;margin:-4px 0 16px;}
  .pv-ptag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#666;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pv-ptag .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
  .pv-st{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:14px;white-space:nowrap;}
  .pv-st .d{width:7px;height:7px;border-radius:50%;}
  /* 표(Tasks) */
  .pv-tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid #ECECEF;border-radius:12px;overflow:hidden;}
  .pv-tbl th{font-size:12.5px;font-weight:700;color:#8a8a92;text-align:left;padding:13px 16px;background:#FAFAFB;border-bottom:1px solid #EFEFF1;}
  .pv-tbl td{font-size:13.5px;color:#3a3a42;padding:13px 16px;border-bottom:1px solid #F4F4F6;}
  .pv-tbl tbody tr:last-child td{border-bottom:none;} .pv-tbl tbody tr:hover{background:#FAFAFB;}
  .pv-tbl td.t{font-weight:600;color:#2b2b33;} .pv-tbl td.due{color:#777;white-space:nowrap;}
  /* 간트 */
  .pv-gantt{background:#fff;border:1px solid #ECECEF;border-radius:12px;padding:8px 14px;overflow:hidden;}
  .g-row{display:flex;align-items:center;height:42px;border-bottom:1px solid #F4F4F6;} .g-row:last-child{border-bottom:none;}
  .g-head{height:34px;color:#9a9aa2;font-size:11px;} .g-lab{width:320px;flex-shrink:0;display:flex;align-items:center;gap:9px;overflow:hidden;padding-right:12px;}
  .g-tt{font-size:13px;color:#3a3a42;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .g-tl{flex:1;position:relative;height:100%;display:flex;} .g-head .g-tl{align-items:center;}
  .g-d{flex:1;text-align:center;border-left:1px solid #F4F4F6;} .g-d.we{background:#FAF8FF;}
  .g-bar{position:absolute;top:50%;transform:translateY(-50%);height:16px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  /* 캘린더 */
  .pv-cal-h{font-size:16px;font-weight:700;color:#333;margin-bottom:12px;}
  .pv-cal{background:#fff;border:1px solid #ECECEF;border-radius:12px;overflow:hidden;}
  .c-wd{display:grid;grid-template-columns:repeat(7,1fr);background:#FAFAFB;border-bottom:1px solid #EFEFF1;}
  .c-wd span{text-align:center;font-size:12px;font-weight:700;color:#9a9aa2;padding:9px 0;} .c-wd .sun{color:#E0584D;} .c-wd .sat{color:#3A78E0;}
  .c-grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .c-cell{min-height:84px;border-right:1px solid #F4F4F6;border-bottom:1px solid #F4F4F6;padding:6px 7px;}
  .c-cell.empty{background:#FCFCFD;} .c-n{font-size:12px;color:#888;}
  .c-ev{display:block;font-size:11px;color:#fff;border-radius:5px;padding:2px 6px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* 파일 */
  .pv-files{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
  .fcard{background:#fff;border:1px solid #ECECEF;border-radius:12px;padding:16px;cursor:pointer;transition:box-shadow .15s;} .fcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .fic{width:42px;height:42px;border-radius:9px;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
  .fnm{font-size:13.5px;font-weight:600;color:#2b2b33;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fmeta{margin:7px 0 5px;} .fsz{font-size:12px;color:#a6a6b4;}
  /* 리스트(멘션/내글/임시저장/북마크) */
  .pv-list{display:flex;flex-direction:column;gap:1px;background:#ECECEF;border:1px solid #ECECEF;border-radius:12px;overflow:hidden;}
  .pv-li{display:flex;align-items:center;gap:12px;background:#fff;padding:14px 16px;cursor:pointer;} .pv-li:hover{background:#FAFAFB;}
  .pv-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;}
  .pv-bm{font-size:18px;width:30px;text-align:center;flex-shrink:0;}
  .pv-li-b{flex:1;min-width:0;} .pv-li-t{font-size:13.5px;color:#2b2b33;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pv-li-m{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:12px;color:#9a9aa2;} .pv-li-m .sep{color:#d8d8de;} .pv-li-m .tm{color:#a6a6b4;}
  .pv-star{color:#FFB800;font-size:16px;}
  /* 대시보드 */
  .d-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:8px;}
  .d-card{background:#fff;border:1px solid #ECECEF;border-radius:12px;padding:20px;} .d-num{font-size:30px;font-weight:800;line-height:1;} .d-lab{font-size:13px;color:#8a8a92;margin-top:8px;}
  .d-sec{font-size:15px;font-weight:700;color:#444;margin:26px 0 12px;}
  .d-prog{background:#fff;border:1px solid #ECECEF;border-radius:12px;padding:8px 18px;}
  .d-pr{padding:13px 0;border-bottom:1px solid #F4F4F6;} .d-pr:last-child{border-bottom:none;}
  .d-pr-h{display:flex;align-items:center;margin-bottom:9px;} .d-pct{margin-left:auto;font-size:13px;font-weight:700;color:#555;}
  .d-bar{height:8px;border-radius:5px;background:#EFEFF2;overflow:hidden;} .d-bar span{display:block;height:100%;border-radius:5px;}
  /* 초대 */
  .pv-invite{background:#fff;border:1px solid #ECECEF;border-radius:14px;padding:40px;text-align:center;max-width:460px;}
  .iv-ic{font-size:40px;} .iv-h{font-size:19px;font-weight:800;margin:12px 0 6px;color:#23233a;} .iv-p{font-size:13.5px;color:#8a8a9a;margin-bottom:20px;line-height:1.5;}
  .iv-row{display:flex;gap:10px;} .iv-in{flex:1;border:1px solid #E2E2E8;border-radius:9px;padding:11px 14px;font-size:13.5px;font-family:inherit;outline:none;} .iv-in:focus{border-color:var(--mm);}
  .iv-btn{background:var(--mm);color:#fff;border:0;border-radius:9px;padding:0 20px;font-size:13.5px;font-weight:700;cursor:pointer;}
</style>
</head>

    var RENDER={ projects:vProjects, allprojects:vAllProjects, dashboard:vDashboard, tasks:vTasks, gantt:vGantt, calendar:vCalendar, files:vFiles, bookmarks:vBookmarks, mentions:vMentions, myposts:vMyPosts, drafts:vDrafts, more:vMore, invite:vInvite };
    var TITLEKEY={ projects:'myProjects', allprojects:'allMember', dashboard:'dashboard', tasks:'tasks', gantt:'gantt', calendar:'calendar', files:'files', bookmarks:'bookmarks', mentions:'mentions', myposts:'myPosts', drafts:'savedDrafts', more:'more', invite:'invite' };
    var VIEW='projects';
    function renderMain(){
      document.getElementById('pv-title').textContent = T(TITLEKEY[VIEW]||'myProjects');
      document.getElementById('pv-ctl').style.display = (VIEW==='projects'||VIEW==='allprojects')?'flex':'none';
      document.getElementById('pv-body').innerHTML = (RENDER[VIEW]||vProjects)();
      [].forEach.call(document.querySelectorAll('.sb-item[data-view]'), function(e){ e.classList.toggle('on', e.getAttribute('data-view')===VIEW); });
    }
    function setView(v){ if(!RENDER[v]) return; VIEW=v; renderMain(); var sb=document.querySelector('.sb'); if(sb) sb.classList.remove('mopen'); var ov=document.getElementById('mob-ov'); if(ov) ov.classList.remove('on'); }
    document.querySelector('.sb').addEventListener('click', function(e){ var it=e.target.closest('.sb-item[data-view]'); if(it) setView(it.getAttribute('data-view')); });

    function applyI18n(){
      var d=UI[LANG]||UI.ja;
      [].forEach.call(document.querySelectorAll('[data-i18n]'), function(e){ var k=e.getAttribute('data-i18n'); if(d[k]) e.textContent=d[k]; });
      document.documentElement.lang=LANG;
      renderMain();
    }
    applyI18n();
    // 언어 토글(우하단) — 누르면 그 언어로 다시 그림 + 앱과 동기화(mm_lang)
    (function(){
      var el=document.createElement('div'); el.id='pv-lang';
      el.style.cssText='position:fixed;bottom:16px;right:16px;z-index:100000;display:flex;gap:2px;background:rgba(20,20,26,.72);border-radius:20px;padding:4px;backdrop-filter:blur(4px);box-shadow:0 3px 12px rgba(0,0,0,.28);font-family:Roboto,sans-serif;';
      el.innerHTML=['ko','ja','en'].map(function(l){ return '<span data-l="'+l+'" style="font-size:11px;font-weight:700;padding:4px 9px;border-radius:16px;cursor:pointer;letter-spacing:.3px;'+(l===LANG?'background:#fff;color:#222;':'color:#cfcfd6;')+'">'+l.toUpperCase()+'</span>'; }).join('');
      document.body.appendChild(el);
      el.addEventListener('click',function(e){ var b=e.target.closest('[data-l]'); if(!b) return; LANG=b.getAttribute('data-l'); try{ localStorage.setItem('mm_lang',LANG); }catch(x){}
        [].forEach.call(el.children,function(s){ var on=s.getAttribute('data-l')===LANG; s.style.background=on?'#fff':'transparent'; s.style.color=on?'#222':'#cfcfd6'; });
        applyI18n();
      });
    })();
    (function(){
      var sb=document.querySelector(".sb"), ov=document.getElementById("mob-ov"), ham=document.getElementById("mham");
      function close(){ sb.classList.remove("mopen"); ov.classList.remove("on"); }
      if(ham) ham.addEventListener("click", function(e){ e.stopPropagation(); var o=sb.classList.toggle("mopen"); ov.classList.toggle("on", o); });
      ov.addEventListener("click", close);
    })();
    // 프로젝트 클릭 → 사람 수만큼 프로필 사진이 칸 안 숫자 옆에 차례로 생겼다가 사라진 뒤 Feed로 이동
    document.getElementById("pv-body").addEventListener("click", function(e){
      var card=e.target.closest(".pcard"); if(!card || card._busy) return; card._busy=true;
      var mem=Math.max(1, +card.getAttribute("data-mem")||1);
      var foot=card.querySelector(".pc-foot .mem"); if(!foot){ location.href="app.html#feed"; return; }
      var holder=document.createElement("span"); holder.style.cssText="display:inline-flex;align-items:center;margin-left:8px;vertical-align:middle;"; foot.appendChild(holder);
      for(var i=0;i<mem;i++){ (function(idx){ setTimeout(function(){
        var a=document.createElement("span");
        a.style.cssText="width:20px;height:20px;border-radius:50%;border:2px solid #fff;background:#dcdce2 center/cover no-repeat;background-image:url("+(window.MM_AV?MM_AV.randomAny():"assets/profile/man4.png")+");margin-left:-8px;box-shadow:0 1px 3px rgba(0,0,0,.28);display:inline-block;transform:scale(0);transition:transform .26s cubic-bezier(.34,1.6,.5,1);";
        holder.appendChild(a); setTimeout(function(){ a.style.transform="scale(1)"; },20);
      }, idx*120); })(i); }
      var inDone=mem*120+380;
      setTimeout(function(){
        holder.style.transition="opacity .32s ease,transform .32s ease"; holder.style.opacity="0"; holder.style.transform="translateY(-5px)";
        setTimeout(function(){ location.href="app.html#feed"; }, 340);
      }, inDone+700);
    });
  </script>
  <script src="effects/avatars.js?v=2"></script>
  <script src="effects/motion.js?v=27"></script>
  <script src="panels.js?v=10"></script>
  <script src="agents_view.js?v=6"></script>
</body>
