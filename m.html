<!DOCTYPE html>
<html lang="ko">
<head>

<title>morningmate — 모바일</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  /* 스크롤바 숨김(기능 유지) */
  *{scrollbar-width:none;-ms-overflow-style:none;}
  *::-webkit-scrollbar{width:0;height:0;display:none;}
  html,body{margin:0;height:100%;font-family:'Poppins','Noto Sans KR','Noto Sans JP',sans-serif;color:#222;background:#fff;-webkit-font-smoothing:antialiased;}
  #m-lang{position:fixed;top:10px;right:12px;z-index:100000;display:flex;gap:2px;background:rgba(40,40,48,.82);border-radius:20px;padding:3px;backdrop-filter:blur(4px);box-shadow:0 3px 10px rgba(0,0,0,.25);}
  #m-lang .lg{font-size:11px;font-weight:700;color:#cfcfd6;padding:4px 9px;border-radius:16px;cursor:pointer;letter-spacing:.3px;}
  #m-lang .lg.on{background:#fff;color:#222;}
  .m-app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:#fff;position:relative;overflow:hidden;}
  /* ===== 상단 헤더 (아이폰 상태바/다이내믹 아일랜드 영역 포함) ===== */
  .m-head{flex-shrink:0;}
  .mhd{padding-top:max(20px,env(safe-area-inset-top));color:#fff;}
  .mhd.white{background:#fff;color:#1a1a22;border-bottom:1px solid #EEE;} .mhd.white .ic svg{stroke:#444;}
  .mhd.red{background:#F2544A;} .mhd.purple{background:#6A4DF4;}
  .mhd .h1{display:flex;align-items:center;gap:6px;padding:8px 14px 12px;}
  .mhd .ttl{font-size:19px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mhd .ttl.big{font-size:21px;font-weight:800;} .mhd .ttl.ctr{text-align:center;font-weight:800;}
  .mhd .ttl .cnt8{color:#9a9aa2;font-size:15px;font-weight:700;}
  .mhd .back,.mhd .ic{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .mhd .back.hide{visibility:hidden;}
  .mhd .ic.aibtn{background:linear-gradient(135deg,#6A4DF4,#A23BE0);border-radius:8px;width:auto;padding:6px 10px;color:#fff;font-size:13px;font-weight:700;gap:4px;}
  .mhd .sub{font-size:13px;font-weight:600;padding:0 16px 12px;display:flex;align-items:center;gap:6px;} .mhd .sub.ctr{justify-content:center;}
  /* ===== 본문 ===== */
  .m-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#F4F4F6;}
  .m-body.white{background:#fff;}
  .m-view{display:none;} .m-view.on{display:block;}
  /* ===== 하단 탭바 ===== */
  .m-tabs{flex-shrink:0;display:flex;border-top:1px solid #ECECEC;background:#fff;padding-bottom:env(safe-area-inset-bottom);}
  .m-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 7px;color:#9a9aa2;font-size:11px;cursor:pointer;position:relative;}
  .m-tab.on{color:#222;font-weight:600;}
  .m-tab.on svg{stroke:#222;}
  .m-tab svg{stroke:#9a9aa2;}
  .m-tab .nb{position:absolute;top:2px;left:50%;margin-left:4px;background:#FF3B30;color:#fff;font-size:9px;font-weight:700;border-radius:9px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  /* ===== FAB ===== */
  .m-fab{position:absolute;right:16px;bottom:74px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7B4DFF,#C13BE0);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(120,60,220,.45);z-index:30;}

  /* 알림 배너 */

  .m-banner .set{margin-left:auto;font-weight:700;text-decoration:underline;text-underline-offset:2px;color:#B5362B;}
  /* ===== My Projects ===== */
  .mp-sec{display:flex;align-items:center;padding:14px 16px 6px;}
  .mp-sec .t{font-size:15px;font-weight:700;color:#333;flex:1;}
  .mp-vt{display:flex;gap:5px;} .mp-vt .v{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#bbb;border:1px solid #E6E6EA;} .mp-vt .v.on{background:#EFECFF;color:#6449FC;border-color:#D9D2FF;}
  .mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px 16px 16px;}
  .mp-card{position:relative;background:#FAFAFA;border:1px solid #E6E6EA;border-left:6px solid var(--c);border-radius:10px;padding:16px 12px 14px;aspect-ratio:1.5;display:flex;flex-direction:column;}

  .fd-top .pin{color:#bbb;}

  .fd-text{font-size:15px;line-height:1.7;color:#333;margin:16px 2px 8px;}

  .fd-text .rb-ul{margin:2px 0 4px;padding-left:18px;list-style:disc;}.fd-text .rb-ul li{margin:3px 0;}.fd-text .rb-ul .rb-e{margin-right:4px;}
  .fd-text .rb-sub{margin:1px 0;color:#666;font-size:13px;line-height:1.55;list-style:none;}
  .fd-text .rb-check{margin:2px 0 4px;padding-left:0;list-style:none;}.fd-text .rb-check li{display:flex;align-items:flex-start;gap:7px;margin:4px 0;}
  .fd-text .rb-cb{flex-shrink:0;width:16px;height:16px;border-radius:4px;border:1.5px solid #C9C9D2;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:2px;}.fd-text .rb-check li.on .rb-cb{background:#2BB24C;border-color:#2BB24C;}.fd-text .rb-check li.on{color:#9a9aa3;}
  .fd-text .rb-tablewrap{margin:8px 0 10px;overflow-x:auto;}.fd-text .rb-table{border-collapse:collapse;width:100%;font-size:12.5px;}
  .fd-text .rb-table th{background:#F4F3E9;border:1px solid #E3E1D4;padding:6px 9px;font-weight:600;color:#3a3a44;text-align:center;white-space:nowrap;}
  .fd-text .rb-table td{border:1px solid #EAEAEF;padding:6px 9px;color:#444;vertical-align:top;}
  .fd-text .rb-tags{margin:11px 0 2px;display:flex;flex-wrap:wrap;gap:7px;}.fd-text .rb-tags span{color:#6449FC;font-weight:600;font-size:13px;}
  .fd-text .rb-note{margin:5px 0 2px;color:#A6A6AE;font-size:12px;}
  .fd-imgs{display:grid;gap:3px;margin:12px 0 4px;border-radius:10px;overflow:hidden;}
  .fd-imgs .it{background-size:cover;background-position:center;background-color:#E6E6EA;position:relative;}
  .fd-imgs.n1{grid-template-columns:1fr;} .fd-imgs.n1 .it{aspect-ratio:16/10;}
  .fd-imgs.n2{grid-template-columns:1fr 1fr;} .fd-imgs.n2 .it{aspect-ratio:1;}
  .fd-imgs.n3{grid-template-columns:1fr 1fr 1fr;} .fd-imgs.n3 .it{aspect-ratio:1;}
  .fd-imgs.n4{grid-template-columns:1fr 1fr;} .fd-imgs.n4 .it{aspect-ratio:1.3;}
  .fd-imgs .it .mo{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .fd-more{display:inline-block;font-size:13px;color:#666;border:1px solid #DADADE;border-radius:18px;padding:8px 16px;margin:6px 2px;}
  .fd-subs{margin:12px 2px 4px;} .fd-subh{font-size:15px;font-weight:700;color:#333;margin-bottom:10px;display:flex;align-items:center;gap:8px;} .fd-subh .n{color:#aaa;font-weight:400;}
  .fd-sub{display:flex;align-items:center;gap:10px;background:#F6F6F8;border:1px solid #EEE;border-radius:9px;padding:11px 12px;margin-bottom:8px;font-size:14px;color:#333;}
  .fd-meta{display:flex;justify-content:flex-end;gap:14px;font-size:13px;color:#aaa;margin:14px 2px 4px;}
  .fd-acts{display:flex;border-top:1px solid #F0F0F0;margin-top:12px;padding-top:4px;} .fd-acts span{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 0;font-size:13.5px;color:#555;}
  .fd-sys{display:flex;justify-content:center;padding:14px;background:#F4F4F6;} .fd-sys span{font-size:12px;color:#999;}
  /* 댓글 섹션 */
  .cm-sec{border-top:1px solid #F0F0F0;margin-top:6px;padding-top:12px;}
  .cm-tabs{display:flex;gap:8px;margin-bottom:10px;} .cm-tabs span{font-size:12.5px;font-weight:600;color:#888;background:#F2F2F4;border-radius:14px;padding:5px 12px;} .cm-tabs span.on{background:#3a3a42;color:#fff;}
  .cm-list{display:flex;flex-direction:column;gap:12px;}
  .cm-row{display:flex;gap:10px;overflow:hidden;} .cm-row .av{width:34px;height:34px;flex-shrink:0;}
  .cm-b{flex:1;min-width:0;} .cm-h{display:flex;align-items:center;gap:7px;} .cm-nm{font-size:13.5px;font-weight:700;color:#222;} .cm-dt{font-size:12px;color:#aaa;}
  .cm-tx{font-size:14px;color:#333;line-height:1.5;margin:3px 0 4px;word-break:break-word;} .cm-lk{font-size:12.5px;color:#999;}
  .cm-file{margin:6px 0 3px;display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #ECECF1;border-radius:12px;padding:14px 15px;max-width:300px;box-shadow:0 1px 5px rgba(0,0,0,.06);}
  .cm-fic{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cm-fmeta{flex:1;min-width:0;} .cm-fnm{font-size:14.5px;font-weight:700;color:#2b2b33;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .cm-fsz{font-size:12.5px;color:#9a9aa2;margin-top:5px;}
  .cm-input{display:flex;align-items:center;gap:9px;margin-top:13px;} .cm-plus{width:26px;height:26px;border-radius:50%;border:1.5px solid #D8D8DE;color:#9a9aa2;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .cm-box{flex:1;display:flex;align-items:center;background:#F4F4F6;border-radius:20px;padding:9px 12px;} .cm-ph{flex:1;font-size:13.5px;color:#b0b0b8;} .cm-send{width:30px;height:30px;border-radius:50%;background:#C7C7CF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .fd-top .who .nm b{font-weight:400;color:#888;font-size:12px;margin-left:3px;} .fd-top .who .nm .tt2{font-weight:400;color:#aaa;font-size:12px;margin-left:6px;}
  .fd-top .tno{font-size:11px;color:#888;background:#F2F2F4;border-radius:4px;padding:5px 9px;white-space:nowrap;align-self:flex-start;}
  .fd-rows{margin-top:4px;} .fd-rows .fr{display:flex;align-items:center;min-height:44px;} .fd-rows .lab{width:84px;font-size:14px;color:#888;flex-shrink:0;white-space:nowrap;}
  .fd-asg{display:flex;align-items:center;gap:10px;} .fd-asg .chip{display:inline-flex;align-items:center;gap:6px;background:#ECECEF;border-radius:6px;padding:4px 9px 4px 4px;font-size:13.5px;font-weight:600;color:#333;} .fd-asg .chip .cx{color:#999;font-size:11px;} .fd-asg .chg{font-size:13.5px;color:#999;}
  .fd-due{font-size:14.5px;color:#FF3B30;} .fd-due .cx{color:#ccc;font-size:12px;margin-left:6px;}
  .fd-dueadd{font-size:13.5px;color:#9a9aa2;cursor:pointer;}
  .fd-addrow{font-size:14px;color:#888;padding:10px 2px 2px;}
  /* todo */
  .td-top{display:flex;align-items:center;margin:14px 2px 8px;} .td-top .np{flex:1;font-size:16px;font-weight:700;color:#333;} .td-top .tpc{font-size:15px;font-weight:700;color:#00B2FF;}
  .td-bar{height:8px;border-radius:8px;background:#E3F4FD;overflow:hidden;margin:0 2px 14px;} .td-bar span{display:block;height:100%;background:#00B2FF;border-radius:8px;}
  .td-item{display:flex;align-items:center;gap:10px;padding:7px 2px;} .td-item .ck{display:flex;flex-shrink:0;} .td-item .tt{flex:1;font-size:14.5px;color:#333;} .td-item .tt.done{color:#bbb;text-decoration:line-through;} .td-item .ti{flex-shrink:0;}
  /* schedule */

// 피드 글이 PC 스키마로 작성된 경우(제조/매장 등) 모바일 스키마로 정규화
function normalizeFeedM(feed){
  if(!feed||!feed.forEach) return feed;
  var KBL={"요청":"request","진행중":"inProgress","피드백":"feedback","완료":"done","보류":"hold"};
  feed.forEach(function(p){
    if(!p) return;
    if(p.time==null && p.datetime) p.time=p.datetime;                                  // 작성시각
    if(p.type==="task"){
      if(p.status && !p.status.key){ var b=pgColor(KBL[p.status.label]||"request");      // 상태값 key/dot 보강
        p.status={key:b.key,label:b.label,bg:p.status.bg||b.bg,color:p.status.color||b.color,dot:b.dot}; }
    } else if(p.type==="todo"){
      (p.items||[]).forEach(function(it){ if(it.t==null) it.t=it.text||"";              // 항목 텍스트/색
        if(it.c==null) it.c=(it.assignee&&it.assignee.color)||"#C7C7CF"; });
    } else if(p.type==="vote"){
      if(p.vstatus==null) p.vstatus=(typeof p.status==="string"?p.status:"");           // 투표 상태/설명/옵션
      if(p.desc==null && p.description!=null) p.desc=p.description;
      (p.options||[]).forEach(function(o){ if(o.l==null) o.l=o.label||""; if(o.v==null) o.v=(o.votes!=null?o.votes:0); });
    }
  });
  return feed;
}
// 알림: actor→ac, activity→task, 빈 시간 보강
function normalizeNotifM(list){
  if(!list||!list.forEach) return list;
  list.forEach(function(n){ if(!n) return;
    if(n.ac==null) n.ac=n.actor||"";
    if(n.task==null && n.activity!=null) n.task=n.activity;
    if(!n.time) n.time=tr('meta.justNow');
  });
  return list;
}
// 채팅 목록: color→av, count(숫자)→cnt, active→act
function normalizeChatsM(list){
  if(!list||!list.forEach) return list;
  list.forEach(function(c){ if(!c) return;
    if(c.av==null) c.av=c.color||"#9DC8FF";
    if(c.cnt==null && typeof c.count==="number") c.cnt=c.count;
    if(c.act==null && c.active!=null) c.act=c.active;
  });
  return list;
}
// 대화: 그룹 첫 상대 메시지에 아바타(head), 시간 없으면 직전 시간 사용
function normalizeConvoM(list){
  if(!list||!list.forEach) return list;
  var lastTime="", prevSide=null;
  list.forEach(function(m){
    if(!m||m.sep){ prevSide=null; lastTime=""; return; }
    var them=(m.side==="them")||(m.who!=null);
    var side=them?("them"+(m.who!=null?("#"+m.who):"")):"me";
    if(them && m.head==null && side!==prevSide) m.head=1;
    if(m.time) lastTime=m.time; else if(lastTime) m.time=lastTime;
    prevSide=side;
  });
  return list;
}

/* 본문 타이핑 효과 */
function mTypewriter(el){
  if(!el || el._typed) return; el._typed=true;
  var full=el.textContent; if(!full) return; el.textContent="";
  var i=0, n=full.length, step=Math.max(1, Math.round(n/70)), iv=setInterval(function(){ i=Math.min(n,i+step); el.textContent=full.slice(0,i); if(i>=n) clearInterval(iv); }, 26);
}
/* FEED: 스크롤 내려갈 때 TASK 카드가 하나씩 아래에 생겨나며 붙는 모션 */
function mScrollReveal(body){
  var cards=[].slice.call(body.querySelectorAll(".fd-card"));
  cards.forEach(function(c){ c.style.opacity="0"; c.style.transform="translateY(70px) scale(.94)"; c._rev=false; });
  function reveal(c){
    if(c._rev)return; c._rev=true; c.style.opacity="1"; c.style.transform="none";
    // 아래에서 솟아올라 윗 카드에 '자석처럼' 쫀득하게 달라붙음(오버슈트 후 정착)
    if(c.animate) c.animate([
      {opacity:0, transform:"translateY(70px) scale(.94)"},
      {opacity:1, transform:"translateY(-9px) scale(1.018)", offset:.6},
      {opacity:1, transform:"translateY(4px) scale(.996)", offset:.8},
      {opacity:1, transform:"translateY(-1px) scale(1.002)", offset:.92},
      {opacity:1, transform:"translateY(0) scale(1)"}
    ],{duration:660, easing:"cubic-bezier(.18,.9,.26,1)"});
    // 본문 타이핑(리치 블록-표/목록/체크리스트 등-이 있으면 HTML이 깨지므로 건너뜀)
    var txt=c.querySelector(".fd-text");
    if(txt && !txt.querySelector(".rb-h,.rb-table,.rb-ul,.rb-check,.rb-tags,.rb-note")) setTimeout(function(){ mTypewriter(txt); }, 240);
  }
  function check(){ var rb=body.getBoundingClientRect(); cards.forEach(function(c){ if(c._rev)return; var r=c.getBoundingClientRect(); if(r.top < rb.bottom-40) reveal(c); }); }
  body.addEventListener("scroll", check);
  check();
}

function shimmerAvatars(body){
  [].slice.call(body.querySelectorAll(".av")).forEach(function(av,i){
    av.style.position="relative"; av.style.overflow="hidden";
    var sk=document.createElement("span"); sk.className="av-skel"; sk.style.animationDelay=(i*40)+"ms"; av.appendChild(sk);

}

  badge.innerHTML='<span class="dot" style="background:'+s.dot+'"></span>'+esc(tr('status.'+s.label.toLowerCase()));
  if(badge.animate) badge.animate([{transform:"scale(.82)"},{transform:"scale(1.12)",offset:.5},{transform:"scale(1)"}],{duration:280,easing:"cubic-bezier(.34,1.5,.5,1)"});
  if(s.label==="Complete") mConfetti(badge); // 완료 도달 시 팡 터지는 효과
}
var mTkLast=null;
document.addEventListener("mouseover", function(e){
  if((STATE.view!=="tasks" && STATE.view!=="rtasks") || !e.target.closest) return;
  var b=e.target.closest(".tk-badge");
  if(b){ if(b!==mTkLast){ mTkLast=b; mTkCycle(b); } } else mTkLast=null;
});

document.addEventListener("click", function(e){
  // Smart Search
  var se=e.target.closest("[data-msearch]"); if(se){ openMobileSearch(); return; }
  var sc=e.target.closest("[data-msclose]"); if(sc){ closeMobileSearch(); return; }
  var st=e.target.closest("[data-mstab]"); if(st){ var ov=document.getElementById("m-search"); if(ov){ ov._tab=st.getAttribute("data-mstab"); [].forEach.call(ov.querySelectorAll(".ms-tab"),function(x){x.classList.toggle("on",x===st);}); msBody(ov); } return; }
  var rk=e.target.closest("[data-reckw]"); if(rk){ var ov2=document.getElementById("m-search"); if(ov2){ var kw=rk.getAttribute("data-reckw"); ov2._kw=kw; var inp=ov2.querySelector(".ms-input"); if(inp)inp.value=kw; msBody(ov2); } return; }
  if(STATE.view==="room"){ var sbc=e.target.closest(".fd-card .fr .fd-badge"); if(sbc){ mAdvanceStatus(sbc); return; } }
  var bk=e.target.closest("[data-go]"); if(bk){ go(bk.getAttribute("data-go")); return; }
  var card=e.target.closest("[data-room]"); if(card){ go("room"); return; }
  var ch=e.target.closest(".ch"); if(ch){ STATE.chat=CHATS[+ch.getAttribute("data-ch")]; go("chatroom"); return; }
  var nt=e.target.closest(".nt"); if(nt){ go("room"); return; }
  var tmi=e.target.closest("#m-taskmenu .tm-i"); if(tmi){ var pn=tmi.getAttribute("data-person"); STATE.taskPerson=(pn==="__all__")?null:pn; closeTaskMenu(); render(); return; }
  var tdd=e.target.closest(".tk-dd[data-taskdd]"); if(tdd){ if(document.getElementById("m-taskmenu")) closeTaskMenu(); else openTaskMenu(tdd); return; }
  if(document.getElementById("m-taskmenu") && !e.target.closest("#m-taskmenu")) closeTaskMenu();
  var fmi=e.target.closest("#m-fmtmenu .tm-i"); if(fmi){ var fk=fmi.getAttribute("data-fmt"); STATE.fileFmt=fk||null; closeFmtMenu(); render(); return; }
  var fdd=e.target.closest(".fl-fil .f[data-fmtdd]"); if(fdd){ if(document.getElementById("m-fmtmenu")) closeFmtMenu(); else openFmtMenu(fdd); return; }
  if(document.getElementById("m-fmtmenu") && !e.target.closest("#m-fmtmenu")) closeFmtMenu();
  var tr=e.target.closest(".tk-r"); if(tr){ go("room"); return; }
  var tab=e.target.closest(".m-tab"); if(tab){ var vv=tab.getAttribute("data-view"); if(vv==="home"){ openHomeRoulette(); return; } if(vv) go(vv); return; }
});
loadDicts(function(){ renderLangToggle(); loadContent(LANG, function(){ render(); }); });
